<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <title>AI Website Translator (Fork)</title>
  <style>
    :root {
      color-scheme: light dark;
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-primary-soft: rgba(99, 102, 241, 0.12);
      --color-primary-ring: rgba(99, 102, 241, 0.22);
      --color-surface: #ffffff;
      --color-surface-2: #f7f8fb;
      --color-border: rgba(15, 23, 42, 0.08);
      --color-border-strong: rgba(15, 23, 42, 0.14);
      --color-text: #0f172a;
      --color-text-secondary: #475569;
      --color-text-tertiary: #94a3b8;
      --radius-sm: 8px;
      --radius-md: 12px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary: #818cf8;
        --color-primary-hover: #a5b4fc;
        --color-primary-soft: rgba(129, 140, 248, 0.2);
        --color-primary-ring: rgba(129, 140, 248, 0.32);
        --color-surface: #141a28;
        --color-surface-2: #1a2133;
        --color-border: rgba(255, 255, 255, 0.08);
        --color-border-strong: rgba(255, 255, 255, 0.14);
        --color-text: #f1f5f9;
        --color-text-secondary: #cbd5e1;
        --color-text-tertiary: #64748b;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      width: 288px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
      font-feature-settings: "kern" 1, "liga" 1, "calt" 1, "palt" 1;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.5;
      color: var(--color-text);
      background: var(--color-surface);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 60%, #ec4899 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.45);
    }

    .brand-title {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .brand-title .name {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .brand-title .sub {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 2px;
    }

    .hint {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin: 0 0 14px;
    }

    .btn {
      width: 100%;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background-color 150ms var(--ease), color 150ms var(--ease), border-color 150ms var(--ease), transform 100ms var(--ease), box-shadow 150ms var(--ease);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.005em;
    }

    .btn + .btn {
      margin-top: 8px;
    }

    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      box-shadow: 0 1px 2px rgba(79, 70, 229, 0.2), 0 4px 12px -2px rgba(79, 70, 229, 0.3);
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(79, 70, 229, 0.25), 0 8px 16px -4px rgba(79, 70, 229, 0.35);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--color-primary-ring), 0 4px 12px -2px rgba(79, 70, 229, 0.3);
    }

    .btn-ghost {
      background: transparent;
      color: var(--color-text-secondary);
      border-color: var(--color-border);
    }

    .btn-ghost:hover {
      background: var(--color-surface-2);
      color: var(--color-text);
      border-color: var(--color-border-strong);
    }

    .btn-ghost:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px var(--color-primary-ring);
    }

    .btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none !important;
    }

    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 14px -16px;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--color-text-tertiary);
      min-height: 16px;
      line-height: 1.4;
      transition: color 150ms var(--ease);
    }

    .status.info { color: var(--color-text-secondary); }
    .status.success { color: #047857; }
    .status.error { color: #dc2626; }

    @media (prefers-color-scheme: dark) {
      .status.success { color: #34d399; }
      .status.error { color: #f87171; }
    }
  </style>
</head>

<body>
  <div class="brand">
    <div class="brand-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 8 6 6"></path>
        <path d="m4 14 6-6 2-3"></path>
        <path d="M2 5h12"></path>
        <path d="M7 2h1"></path>
        <path d="m22 22-5-10-5 10"></path>
        <path d="M14 18h6"></path>
      </svg>
    </div>
    <div class="brand-title">
      <div class="name">AI Translator</div>
      <div class="sub">AI Website Translator (Fork)</div>
    </div>
  </div>

  <p class="hint">Translate this page to English.</p>

  <button id="translateBtn" class="btn btn-primary" type="button">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="9 18 15 12 9 6"></polyline>
    </svg>
    <span>Translate</span>
  </button>
  <button id="excludeBtn" class="btn btn-ghost" type="button">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
    </svg>
    <span>Exclude this site</span>
  </button>
  <button id="optionsBtn" class="btn btn-ghost" type="button">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
    <span>Settings</span>
  </button>

  <div class="status" id="statusText" role="status" aria-live="polite"></div>

  <script src="translations.js"></script>
  <script src="popup.js"></script>
</body>

</html>
